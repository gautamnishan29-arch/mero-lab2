<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Crumbs Bakery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#fffaf5;color:#333}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;background:#ff7e5f;color:white
}

.hero{
text-align:center;padding:80px 20px;
background:linear-gradient(45deg,#ff7e5f,#feb47b);
color:white
}

.section{padding:60px 40px;text-align:center}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;margin-top:40px
}

.card{
background:white;padding:25px;border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1)
}

.btn{
margin-top:10px;padding:10px 20px;border:none;
border-radius:20px;background:#ff7e5f;color:white;
cursor:pointer
}

.cart{
position:fixed;right:0;top:0;width:350px;height:100%;
background:white;box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;overflow:auto
}

.cart h2{text-align:center;margin-bottom:15px}
.cart-item{
display:flex;justify-content:space-between;
margin-bottom:10px;font-size:14px
}

.remove{color:red;cursor:pointer}

.total{margin-top:15px;font-weight:bold}

input,textarea{
width:100%;padding:8px;margin-top:8px;
border-radius:5px;border:1px solid #ccc
}

.order-btn{
margin-top:15px;width:100%;
padding:12px;background:#28a745;
color:white;border:none;cursor:pointer
}

footer{
padding:20px;text-align:center;
background:#ff7e5f;color:white;margin-top:40px
}
</style>
</head>
<body>

<header>
<h2>Royal Crumbs Bakery</h2>
</header>

<section class="hero">
<h1>Order Fresh Bakery Items 🍰</h1>
<p>Delicious treats delivered to your home</p>
</section>

<section class="section">
<h2>Our Menu</h2>
<div class="menu-grid">
<div class="card">
<h3>Chocolate Cake</h3>
<p>$15</p>
<button class="btn" onclick="addToCart('Chocolate Cake',15)">Add to Cart</button>
</div>

<div class="card">
<h3>Strawberry Cupcake</h3>
<p>$6</p>
<button class="btn" onclick="addToCart('Strawberry Cupcake',6)">Add to Cart</button>
</div>

<div class="card">
<h3>Butter Croissant</h3>
<p>$4</p>
<button class="btn" onclick="addToCart('Butter Croissant',4)">Add to Cart</button>
</div>
</div>
</section>

<div class="cart">
<h2>Your Cart 🛒</h2>
<div id="cartItems"></div>
<div class="total" id="total"></div>

<h3 style="margin-top:20px;">Customer Details</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<footer>
© 2026 Royal Crumbs Bakery
</footer>

<script>
let cart=[];

function addToCart(name,price){
let item=cart.find(p=>p.name===name);
if(item){
item.quantity++;
}else{
cart.push({name,price,quantity:1});
}
updateCart();
}

function updateCart(){
let cartDiv=document.getElementById("cartItems");
let totalDiv=document.getElementById("total");
cartDiv.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price*item.quantity;
cartDiv.innerHTML+=`
<div class="cart-item">
${item.name} x${item.quantity} - $${item.price*item.quantity}
<span class="remove" onclick="removeItem(${index})">✖</span>
</div>`;
});

totalDiv.innerText="Total: $"+total;
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function placeOrder(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(cart.length===0){
alert("Your cart is empty!");
return;
}
if(name===""||phone===""||address===""){
alert("Please fill all details!");
return;
}

alert("Order Placed Successfully 🎉\n\nThank you "+name+"!\nYour order will be delivered soon.");

cart=[];
updateCart();
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";
}
</script>

</body>
</html>
